<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC 장비 카탈로그 DB</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
  font-size: 13px;
  background: #f0eeeb;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #999; border-radius: 3px; }

/* ── Sidebar ── */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: #1a2035;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
}
.sidebar-title {
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  padding: 18px 16px 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.group-label {
  color: #6b7a99;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 14px 16px 4px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.menu-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: #b0b8d0;
  padding: 7px 16px 7px 24px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: background 0.15s;
  white-space: nowrap;
}
.menu-item:hover { background: rgba(255,255,255,0.08); }
.menu-item.active { background: #c0392b; color: #fff; }

/* ── Main ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Header ── */
#page-header {
  background: #1a2035;
  border-bottom: 3px solid #c0392b;
  padding: 13px 24px;
  flex-shrink: 0;
}
#header-title { font-size: 15px; font-weight: 700; color: #fff; }
#header-sub { font-size: 11px; color: #8899bb; margin-top: 3px; }

/* ── Toolbar ── */
#toolbar {
  padding: 9px 24px;
  background: #fff;
  border-bottom: 1px solid #dcd9d3;
  display: flex;
  gap: 7px;
  align-items: center;
  flex-wrap: wrap;
  flex-shrink: 0;
}
#toolbar input[type=text],
#toolbar input[type=number] {
  border: 1px solid #c8c4bc;
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 12px;
  font-family: inherit;
  background: #fafafa;
  outline: none;
}
#toolbar input[type=text] { width: 180px; }
#toolbar input[type=number] { width: 88px; }
#toolbar input:focus { border-color: #c0392b; background: #fff; }
#toolbar input:disabled { opacity: 0.35; background: #f0eeeb; }
.lbl { font-size: 11px; color: #666; white-space: nowrap; }
.sep { width: 1px; height: 22px; background: #dcd9d3; flex-shrink: 0; }

/* ── Buttons ── */
.btn {
  border: none;
  border-radius: 4px;
  padding: 6px 13px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-red  { background: #c0392b; color: #fff; }
.btn-red:hover  { background: #a93226; }
.btn-dark { background: #2c3345; color: #e8eaf0; }
.btn-dark:hover { background: #1a2035; }
.btn-sm { padding: 3px 8px; font-size: 11px; border-radius: 3px; }
.btn-edit { background: #2b7de9; color: #fff; }
.btn-edit:hover { background: #1a5cac; }
.btn-del  { background: #e03e3e; color: #fff; }
.btn-del:hover  { background: #c53030; }

/* ── Content ── */
#content {
  flex: 1;
  overflow: auto;
  padding: 16px 24px;
}
.no-data {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: #aaa;
  gap: 8px;
}
.no-data .icon { font-size: 40px; }
.no-data .msg  { font-size: 14px; color: #888; }
.no-data .sub  { font-size: 12px; color: #bbb; }
.add-btn { margin-top: 12px; }

.table-wrap { overflow-x: auto; }
table {
  border-collapse: collapse;
  font-size: 12px;
  background: #fff;
  width: 100%;
  min-width: max-content;
}
thead th {
  background: #2c3345;
  color: #e8eaf0;
  padding: 8px 10px;
  text-align: left;
  white-space: nowrap;
  border: 1px solid #c8c4bc;
  font-weight: 600;
  font-size: 11px;
  user-select: none;
}
thead th.sortable { cursor: pointer; }
thead th.sortable:hover { background: #3a4560; }
thead th.sort-asc  { background: #3d2b1a; color: #ffcc99; }
thead th.sort-desc { background: #3d2b1a; color: #ffcc99; }
.sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.6; }
thead th.sort-asc  .sort-icon,
thead th.sort-desc .sort-icon { opacity: 1; }
.sort-icon sup { font-size: 8px; vertical-align: super; line-height: 0; }
td {
  padding: 6px 10px;
  border: 1px solid #c8c4bc;
  white-space: nowrap;
  color: #333;
}
tbody tr:nth-child(even) td { background: #f4f3f0; }
tbody tr:hover td { background: #edeae4 !important; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.ctr { text-align: center; }

/* ── 2단 헤더 ── */
thead th.grp {
  background: #1a2744;
  text-align: center;
  border-bottom: 1px solid #3a4a6a;
}
thead th.grp-leaf {
  background: #2c3345;
}
thead th.grp-leaf.sort-asc,
thead th.grp-leaf.sort-desc { background: #3d2b1a; color: #ffcc99; }

/* ── Selection Panel ── */
#sel-panel {
  background: #fff;
  border-top: 2px solid #c0392b;
  flex-shrink: 0;
  max-height: 210px;
  display: none;
  flex-direction: column;
}
#sel-panel-hd {
  padding: 7px 24px;
  background: #fff9f9;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
  border-bottom: 1px solid #f0dada;
}
#sel-panel-hd h3 { font-size: 12px; color: #c0392b; font-weight: 700; }
#sel-panel-bd { overflow: auto; padding: 8px 24px; flex: 1; }

/* ── Modal ── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: #fff;
  border-radius: 8px;
  width: 500px;
  max-width: 95vw;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
#modal-hd {
  background: #1a2035;
  color: #fff;
  padding: 13px 18px;
  border-radius: 8px 8px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#modal-hd h3 { font-size: 14px; }
#modal-hd button {
  background: none; border: none; color: #aaa;
  font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
}
#modal-hd button:hover { color: #fff; }
#modal-bd { overflow-y: auto; padding: 16px 18px; flex: 1; }
#modal-ft {
  padding: 11px 18px;
  border-top: 1px solid #e8e8e8;
  display: flex; justify-content: flex-end; gap: 8px;
}
.form-row { margin-bottom: 11px; }
.form-row label {
  display: block;
  font-size: 11px; color: #555; font-weight: 600; margin-bottom: 4px;
}
.form-row input[type=text] {
  width: 100%;
  border: 1px solid #c8c4bc;
  border-radius: 4px;
  padding: 7px 10px;
  font-size: 12px;
  font-family: inherit;
  outline: none;
}
.form-row input:focus { border-color: #c0392b; }
.form-hint { font-size: 10px; color: #aaa; margin-top: 8px; }

/* Mobile */
#mob-toggle { display: none; }
#mob-overlay { display: none; }
@media (max-width: 640px) {
  #sidebar {
    position: fixed; left: -240px; top: 0;
    height: 100vh; z-index: 100; transition: left 0.25s;
  }
  #sidebar.open { left: 0; }
  #mob-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 99;
  }
  #mob-overlay.open { display: block; }
  #mob-toggle {
    display: flex; align-items: center;
    gap: 6px; padding: 5px 10px;
    border: 1px solid #c8c4bc; border-radius: 4px;
    background: #fff; cursor: pointer;
    font-size: 12px; font-family: inherit;
  }
}
</style>
</head>

<div id="mob-overlay" onclick="closeSb()"></div>

<div id="sidebar">
  <div class="sidebar-title">HVAC 장비 DB</div>
</div>

<div id="main">
  <div id="page-header">
    <div id="header-title">장비를 선택하세요</div>
    <div id="header-sub"></div>
  </div>

  <div id="toolbar">
    <button id="mob-toggle" onclick="toggleSb()">☰ 메뉴</button>
    <input type="text"   id="srch"    placeholder="🔍 키워드 검색..." onchange="applyFilter()">
    <span class="lbl" id="cap-lbl">냉방용량 ≥</span>
    <input type="number" id="cap-min" placeholder="W" onchange="applyFilter()">
    <div class="sep"></div>
    <button class="btn btn-red"  onclick="openAdd()">+ 장비 추가</button>
    <div class="sep"></div>
    <button class="btn btn-dark" onclick="saveJSON()">💾 저장</button>
    <label  class="btn btn-dark" style="cursor:pointer">
      📂 불러오기<input type="file" accept=".json" style="display:none" onchange="loadJSON(event)">
    </label>
    <button class="btn btn-dark" onclick="exportSel()">📋 선정 내보내기</button>
  </div>

  <div id="content">
    <div class="no-data">
      <div class="icon">🏭</div>
      <div class="msg">HVAC 장비 카탈로그 DB</div>
      <div class="sub">사이드바에서 장비를 선택하세요</div>
    </div>
  </div>

  <div id="sel-panel">
    <div id="sel-panel-hd" onclick="toggleSelPanel()">
      <h3>📋 선정 목록 <span id="sel-count"></span></h3>
      <span id="sel-arrow">▲</span>
    </div>
    <div id="sel-panel-bd"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="onOvClick(event)">
  <div id="modal">
    <div id="modal-hd">
      <h3 id="modal-title">장비 추가</h3>
      <button onclick="closeModal()">×</button>
    </div>
    <div id="modal-bd"></div>
    <div id="modal-ft">
      <button class="btn btn-dark" onclick="closeModal()">취소</button>
      <button class="btn btn-red"  onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

function selectKey(key) {
  curKey = key;
  sortKeys = [];
  document.querySelectorAll('.menu-item').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key)
  );
  document.getElementById('srch').value = '';
  document.getElementById('cap-min').value = '';
  render();
}

function clickSort(colIdx, event) {
  const shift = event && event.shiftKey;
  const existing = sortKeys.findIndex(k => k.col === colIdx);

  if (shift) {
    // Shift+클릭: 기존 정렬에 추가 / 토글 / 제거
    if (existing >= 0) {
      if (sortKeys[existing].dir === 1) {
        sortKeys[existing] = { col: colIdx, dir: -1 };
      } else {
        sortKeys.splice(existing, 1);
      }
    } else {
      sortKeys.push({ col: colIdx, dir: 1 });
    }
  } else {
    // 일반 클릭: 같은 컬럼이면 ASC→DESC→해제, 다른 컬럼이면 초기화 후 새로 시작
    if (existing >= 0 && sortKeys.length === 1) {
      if (sortKeys[0].dir === 1) sortKeys = [{ col: colIdx, dir: -1 }];
      else sortKeys = [];
    } else {
      sortKeys = [{ col: colIdx, dir: 1 }];
    }
  }
  render();
}

function toggleSb() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mob-overlay').classList.toggle('open');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('open');

// ════════════════════════════════════════
// COL HELPERS
// ════════════════════════════════════════
function flatCols(cols) {
  const out = [];
  cols.forEach(c => { c.children ? c.children.forEach(ch => out.push(ch)) : out.push(c.label); });
  return out;
}

function flatColsFull(cols) {
  const out = [];
  cols.forEach(c => {
    if (c.children) c.children.forEach(ch => out.push({ display: `${c.label} › ${ch}`, leaf: ch }));
    else out.push({ display: c.label, leaf: c.label });
  });
  return out;
}

function buildThead(cols, skeys) {
  function badge(li) {
    const idx = skeys.findIndex(k => k.col === li);
    if (idx < 0) return { cls: '', ic: '<span class="sort-icon">⇅</span>' };
    const { dir } = skeys[idx];
    const rank = skeys.length > 1 ? `<sup>${idx + 1}</sup>` : '';
    const arrow = dir === 1 ? '▲' : '▼';
    return {
      cls: dir === 1 ? ' sort-asc' : ' sort-desc',
      ic: `<span class="sort-icon">${arrow}${rank}</span>`,
    };
  }

  const hasGrp = cols.some(c => c.children && c.children.length);
  if (!hasGrp) {
    let tr = '<tr><th class="ctr" style="width:36px">#</th><th class="ctr" style="width:40px">선정</th>';
    let li = 0;
    cols.forEach(c => {
      const { cls, ic } = badge(li);
      tr += `<th class="sortable${cls}" onclick="clickSort(${li},event)">${esc(c.label)}${ic}</th>`;
      li++;
    });
    tr += '<th class="ctr" style="width:90px">액션</th></tr>';
    return `<thead>${tr}</thead>`;
  }
  let r1 = '<tr><th class="ctr grp-leaf" rowspan="2" style="width:36px">#</th><th class="ctr grp-leaf" rowspan="2" style="width:40px">선정</th>';
  let r2 = '<tr>';
  let li = 0;
  cols.forEach(c => {
    if (c.children && c.children.length) {
      r1 += `<th class="grp" colspan="${c.children.length}">${esc(c.label)}</th>`;
      c.children.forEach(ch => {
        const { cls, ic } = badge(li);
        r2 += `<th class="sortable grp-leaf${cls}" onclick="clickSort(${li},event)">${esc(ch)}${ic}</th>`;
        li++;
      });
    } else {
      const { cls, ic } = badge(li);
      r1 += `<th rowspan="2" class="sortable grp-leaf${cls}" onclick="clickSort(${li},event)">${esc(c.label)}${ic}</th>`;
      li++;
    }
  });
  r1 += '<th class="ctr grp-leaf" rowspan="2" style="width:90px">액션</th></tr>';
  r2 += '</tr>';
  return `<thead>${r1}${r2}</thead>`;
}

function buildTheadSimple(cols) {
  const hasGrp = cols.some(c => c.children && c.children.length);
  if (!hasGrp) {
    return '<thead><tr>' + cols.map(c => `<th>${esc(c.label)}</th>`).join('') + '</tr></thead>';
  }
  let r1 = '<tr>', r2 = '<tr>';
  cols.forEach(c => {
    if (c.children && c.children.length) {
      r1 += `<th class="grp" colspan="${c.children.length}">${esc(c.label)}</th>`;
      c.children.forEach(ch => { r2 += `<th class="grp-leaf">${esc(ch)}</th>`; });
    } else {
      r1 += `<th class="grp-leaf" rowspan="2">${esc(c.label)}</th>`;
    }
  });
  return `<thead>${r1}</tr>${r2}</tr></thead>`;
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function render() {
  if (!curKey) return;
  const eq = DB[curKey];
  document.getElementById('header-title').textContent = eq.name;

  const flat = flatCols(eq.cols);
  const hasCap = flat.includes('냉방용량(W)');
  document.getElementById('cap-lbl').style.opacity = hasCap ? '1' : '0.3';
  document.getElementById('cap-min').disabled = !hasCap;

  const rows = getFiltered();
  document.getElementById('header-sub').textContent =
    `총 ${eq.data.length}개 항목` +
    (rows.length < eq.data.length ? ` (필터 결과: ${rows.length}개)` : '');

  const content = document.getElementById('content');

  if (eq.data.length === 0) {
    content.innerHTML =
      `<div class="no-data">
        <div class="icon">📋</div>
        <div class="msg">카탈로그 추가 예정</div>
        <div class="sub">장비 추가 버튼으로 데이터를 입력하세요.</div>
      </div>
      <button class="btn btn-red add-btn" onclick="openAdd()">+ 장비 추가</button>`;
    return;
  }

  const selSet = selections[curKey] || new Set();

  let html = `<div class="table-wrap"><table>`;
  html += buildThead(eq.cols, sortKeys);
  html += '<tbody>';

  if (rows.length === 0) {
    html += `<tr><td colspan="${flat.length + 3}" style="text-align:center;padding:28px;color:#aaa">
      검색 결과가 없습니다.
    </td></tr>`;
  } else {
    rows.forEach(({ row, idx }) => {
      const chk = selSet.has(idx) ? 'checked' : '';
      html += `<tr>
        <td class="ctr" style="color:#bbb;font-size:11px">${idx + 1}</td>
        <td class="ctr"><input type="checkbox" ${chk} onchange="toggleSel(${idx},this.checked)"></td>`;
      row.forEach(cell => {
        if (cell === null || cell === undefined || cell === '') {
          html += `<td><span style="color:#ccc">—</span></td>`;
        } else if (typeof cell === 'number') {
          html += `<td class="num">${cell.toLocaleString('ko-KR')}</td>`;
        } else {
          html += `<td>${esc(String(cell))}</td>`;
        }
      });
      html += `<td class="ctr">
        <button class="btn btn-sm btn-edit" onclick="openEdit(${idx})">수정</button>
        <button class="btn btn-sm btn-del"  onclick="delRow(${idx})">삭제</button>
      </td></tr>`;
    });
  }

  html += `</tbody></table></div>
    <button class="btn btn-red add-btn" onclick="openAdd()">+ 장비 추가</button>`;
  content.innerHTML = html;
  renderSelPanel();
}

// ════════════════════════════════════════
// FILTER
// ════════════════════════════════════════
function getFiltered() {
  const eq = DB[curKey];
  const flat = flatCols(eq.cols);
  const kw = document.getElementById('srch').value.trim().toLowerCase();
  const capMin = parseFloat(document.getElementById('cap-min').value) || null;
  const capIdx = flat.indexOf('냉방용량(W)');

  let result = eq.data.map((row, idx) => ({ row, idx })).filter(({ row }) => {
    if (kw) {
      const hit = row.some(c => c !== null && c !== undefined && String(c).toLowerCase().includes(kw));
      if (!hit) return false;
    }
    if (capMin !== null && capIdx >= 0) {
      const v = row[capIdx];
      if (typeof v !== 'number' || v < capMin) return false;
    }
    return true;
  });

  if (sortKeys.length > 0) {
    result.sort((a, b) => {
      for (const { col, dir } of sortKeys) {
        const av = a.row[col], bv = b.row[col];
        const aNil = av === null || av === undefined;
        const bNil = bv === null || bv === undefined;
        if (aNil && bNil) continue;
        if (aNil) return 1;
        if (bNil) return -1;
        const cmp = (typeof av === 'number' && typeof bv === 'number')
          ? av - bv
          : String(av).localeCompare(String(bv), 'ko');
        if (cmp !== 0) return cmp * dir;
      }
      return 0;
    });
  }
  return result;
}

function applyFilter() {
  if (curKey) render();
}

// ════════════════════════════════════════
// CRUD
// ════════════════════════════════════════
function openAdd() {
  editIdx = null;
  document.getElementById('modal-title').textContent = '장비 추가';
  buildForm(null);
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(idx) {
  editIdx = idx;
  document.getElementById('modal-title').textContent = '장비 수정';
  buildForm(DB[curKey].data[idx]);
  document.getElementById('modal-overlay').classList.add('open');
}

function buildForm(rowData) {
  const fullCols = flatColsFull(DB[curKey].cols);
  let html = fullCols.map((col, i) => {
    const v = rowData ? (rowData[i] != null ? rowData[i] : '') : '';
    return `<div class="form-row">
      <label>${esc(col.display)}</label>
      <input type="text" data-i="${i}" value="${esc(String(v))}" placeholder="${esc(col.leaf)}">
    </div>`;
  }).join('');
  html += `<p class="form-hint">※ 숫자만 입력 시 수치로 자동 인식 &nbsp;|&nbsp; 빈 칸 또는 "—" 입력 시 null 처리</p>`;
  document.getElementById('modal-bd').innerHTML = html;
}

function saveModal() {
  const inputs = document.querySelectorAll('#modal-bd input[data-i]');
  const row = [];
  inputs.forEach(inp => {
    const v = inp.value.trim();
    if (v === '' || v === '—') { row.push(null); return; }
    const n = Number(v);
    row.push(!isNaN(n) ? n : v);
  });
  const eq = DB[curKey];
  if (editIdx !== null) {
    eq.data[editIdx] = row;
  } else {
    eq.data.push(row);
  }
  closeModal();
  lsSave();
  render();
}

function delRow(idx) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  DB[curKey].data.splice(idx, 1);
  if (selections[curKey]) {
    const ns = new Set();
    selections[curKey].forEach(i => {
      if (i < idx) ns.add(i);
      else if (i > idx) ns.add(i - 1);
    });
    selections[curKey] = ns;
  }
  lsSave();
  render();
}

// ════════════════════════════════════════
// SELECTION
// ════════════════════════════════════════
function toggleSel(idx, checked) {
  if (!selections[curKey]) selections[curKey] = new Set();
  if (checked) selections[curKey].add(idx);
  else         selections[curKey].delete(idx);
  renderSelPanel();
}

function renderSelPanel() {
  const panel  = document.getElementById('sel-panel');
  const body   = document.getElementById('sel-panel-bd');
  const countEl = document.getElementById('sel-count');

  let total = 0;
  Object.values(selections).forEach(s => { total += (s ? s.size : 0); });

  if (total === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'flex';
  countEl.textContent = `(${total}개)`;

  if (!selPanelOpen) { body.innerHTML = ''; return; }

  let html = '';
  Object.entries(selections).forEach(([key, idxSet]) => {
    if (!idxSet || idxSet.size === 0) return;
    const eq = DB[key];
    html += `<div style="font-size:11px;font-weight:700;color:#c0392b;margin:6px 0 4px">${esc(eq.name)}</div>`;
    html += `<div class="table-wrap"><table>`;
    html += buildTheadSimple(eq.cols);
    html += '<tbody>';
    [...idxSet].sort((a,b)=>a-b).forEach(i => {
      const row = eq.data[i];
      if (!row) return;
      html += '<tr>';
      row.forEach(cell => {
        if (cell === null || cell === undefined || cell === '') {
          html += `<td><span style="color:#ccc">—</span></td>`;
        } else if (typeof cell === 'number') {
          html += `<td class="num">${cell.toLocaleString('ko-KR')}</td>`;
        } else {
          html += `<td>${esc(String(cell))}</td>`;
        }
      });
      html += '</tr>';
    });
    html += `</tbody></table></div>`;
  });
  body.innerHTML = html;
}

function toggleSelPanel() {
  selPanelOpen = !selPanelOpen;
  document.getElementById('sel-arrow').textContent = selPanelOpen ? '▲' : '▼';
  renderSelPanel();
}

// ════════════════════════════════════════
// LOCAL STORAGE AUTO-SAVE
// ════════════════════════════════════════
const LS_KEY = 'hvac_catalog_userdata';

function lsSave() {
  try {
    const out = {};
    Object.keys(DB).forEach(k => { out[k] = DB[k].data; });
    localStorage.setItem(LS_KEY, JSON.stringify(out));
  } catch(e) {}
}

function lsLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    Object.keys(saved).forEach(k => {
      if (DB[k] && Array.isArray(saved[k])) DB[k].data = saved[k];
    });
  } catch(e) {}
}

// ════════════════════════════════════════
// SAVE / LOAD / EXPORT
// ════════════════════════════════════════
function saveJSON() {
  const selObj = {};
  Object.entries(selections).forEach(([k,v]) => { if (v && v.size) selObj[k] = [...v]; });
  const snapshot = {};
  Object.keys(DB).forEach(k => { snapshot[k] = { name: DB[k].name, cols: DB[k].cols, data: DB[k].data }; });
  const blob = new Blob([JSON.stringify({ DB: snapshot, selections: selObj }, null, 2)], { type:'application/json' });
  triggerDownload(blob, 'hvac-catalog.json');
}

function loadJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (p.DB) {
        Object.keys(p.DB).forEach(k => {
          if (DB[k] && Array.isArray(p.DB[k].data)) DB[k].data = p.DB[k].data;
        });
      }
      if (p.selections) {
        Object.keys(p.selections).forEach(k => {
          selections[k] = new Set(p.selections[k]);
        });
      }
      if (curKey) render(); else renderSelPanel();
      lsSave();
      alert('불러오기 완료!');
    } catch {
      alert('올바른 JSON 파일이 아닙니다.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportSel() {
  const out = {};
  Object.entries(selections).forEach(([key, idxSet]) => {
    if (!idxSet || idxSet.size === 0) return;
    const eq = DB[key];
    out[key] = {
      name: eq.name, cols: eq.cols,
      data: [...idxSet].sort((a,b)=>a-b).map(i => eq.data[i]).filter(Boolean),
    };
  });
  if (!Object.keys(out).length) { alert('선정된 장비가 없습니다.'); return; }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type:'application/json' });
  triggerDownload(blob, 'hvac-selection.json');
}

function triggerDownload(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
